spring.application.name=ecommerce-copa-api
spring.config.import=optional:file:.env[.properties]

server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.servlet.session.timeout=30m
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_copa}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.with-credentials=true

app.upload-dir=${APP_UPLOAD_DIR:uploads}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4321,http://127.0.0.1:4321,http://localhost:3000,http://127.0.0.1:3000}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
